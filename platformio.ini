[env:yolo_uno]
platform = espressif32
board = yolo_uno
framework = arduino
monitor_speed = 115200

build_flags =
    -D ARDUINO_USB_MODE=1
    ; Yolo Uno uses native USB CDC for Serial logging.
    -D ARDUINO_USB_CDC_ON_BOOT=1
    
lib_deps = 
    # The exact version
    #robtillaart/DHT20 @ 0.3.1
    madhephaestus/ESP32Servo @ ^3.0.8
